{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h2>Профиль пользователя</h2>
        <p><strong>Имя:</strong> {{ user.name }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Дата регистрации:</strong> {{ user.created_date.strftime('%d.%m.%Y') }}</p>
        <p><strong>Всего баллов:</strong> {{ points }}</p>
        <p><strong>Выполнено целей:</strong> {{ completed_count }}</p>
        <a href="/goals" class="btn btn-primary">Мои цели</a>
        <a href="/logout" class="btn btn-secondary">Выйти</a>
    </div>
</div>
{% endblock %}
