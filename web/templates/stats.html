{% extends "base.html" %}
{% block content %}
<h1>Статистика выполненных целей</h1>
<table class="table table-bordered">
    <thead class="table-light"><tr><th>День недели</th><th>Количество выполненных целей</th></tr></thead>
    <tbody>
    {% for day, count in stats_week %}
    <tr><td>{{ day }}</td><td>{{ count }}</td></tr>
    {% endfor %}
    </tbody>
</table>
<a href="/profile" class="btn btn-secondary">Назад в профиль</a>
{% endblock %}
